name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'   

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Run linting
      run: |
        uv run flake8 .
        uv run black --check .

    - name: Run tests
      run: uv run pytest --cov=app --cov-report=term-missing

    - name: Build Docker image
      run: docker build -t obesity-api .