name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'   

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Run linting
      run: |
        uv run flake8 app tests --max-line-length=88
        uv run black --check .

    - name: Run tests
      run: uv run pytest --cov=app --cov-report=term-missing
    
    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and tag Docker image
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/obesity-api:latest \
                     -t ${{ secrets.DOCKER_USERNAME }}/obesity-api:${{ github.sha }} .

    - name: Push Docker image
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/obesity-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/obesity-api:${{ github.sha }}
    